<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/CSS/Styles.css" />
  </head>

  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" aria-label="Left navigation">
        <div class="sidebar__title">Menu</div>

        <nav class="sidebar__nav">
          <a class="sidebar__link" href="/HTML/index.html">Dashboard</a>
          <a class="sidebar__link  active" href="/HTML/Habits.html">Habits</a>
          <a class="sidebar__link" href="/HTML/Timer.html">Timer</a>
          <a class="sidebar__link" href="/HTML/Todolist.html">ToDoList</a>
          <a class="sidebar__link" href="/HTML/Streaks.html">Streaks</a>
          <a class="sidebar__link" href="/HTML/Stats.html">Stats</a>          
          <a class="sidebar__link" href="/HTML/Settings.html">Settings</a>
        </nav>
      </aside>

      <!-- Main -->
      <div class="main">
        <!-- Top bar -->
        <header class="topbar">
          <button class="hamburger" id="hamburger" aria-label="Toggle sidebar" aria-expanded="false">
            <span></span>
            <span></span>
          </button>

          <div class="topbar__titleWrap">
            <div class="topbar__title">Habits</div>
          </div>
        </header>

        <!-- Page content -->
        <main class="content">
          <!-- Big orange blocks (drop your habit widgets in these) -->
          <section class="panel">
            <h2 class="panel__heading">Panel 1</h2>
            <p class="panel__hint">Put timer / daily habits / streaks here.</p>
              <!-- Habits Panel -->
<section class="panel">
  <div class="panel__header">
    <h2 class="panel__title">Habits</h2>
    <p class="panel__subtitle">Build consistency. Tick habits off daily.</p>
  </div>

  <div class="habits__top">
    <form id="habitForm" class="habitForm" autocomplete="off">
      <input
        id="habitName"
        class="input"
        type="text"
        placeholder="Add a habit (e.g. Gym, Study, Read)"
        maxlength="32"
        required
      />
      <button class="btn btn--primary" type="submit">Add</button>
    </form>

    <div class="habits__progress">
      <div class="habits__progressTitle">Today’s Progress</div>
      <div class="habits__progressValue" id="todayProgress">0 / 0</div>
      <div class="habits__progressBar" aria-hidden="true">
        <div class="habits__progressFill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <div class="habits__list" id="habitList" aria-live="polite">
    <!-- Habit cards render here -->
  </div>
</section>

<script src="/JS/Habits.js"></script>
          </section>

          
        </main>
      </div>
    </div>

    <script>
      const sidebar = document.getElementById("sidebar");
      const hamburger = document.getElementById("hamburger");

      hamburger.addEventListener("click", () => {
        const isOpen = sidebar.classList.toggle("sidebar--open");
        hamburger.setAttribute("aria-expanded", String(isOpen));
      });
    </script>
  </body>
  <script src="/Server/Habits.js"></script>
</html>
