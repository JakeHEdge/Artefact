<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/CSS/Styles.css" />
  </head>



  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" aria-label="Left navigation">
        <div class="sidebar__title">Menu</div>

        <nav class="sidebar__nav">
          <a class="sidebar__link active" href="/HTML/index.html">Dashboard</a>
          <a class="sidebar__link" href="/HTML/Habits.html">Habits</a>
          <a class="sidebar__link" href="/HTML/Timer.html">Timer</a>
          <a class="sidebar__link" href="/HTML/Todolist.html">ToDoList</a>
          <a class="sidebar__link" href="/HTML/Streaks.html">Streaks</a>
          <a class="sidebar__link" href="/HTML/Stats.html">Stats</a>          
          <a class="sidebar__link" href="/HTML/Settings.html">Settings</a>
        </nav>
      </aside>

      <!-- Main -->
      <div class="main">
        <!-- Top bar -->
        <header class="topbar">
          <button class="hamburger" id="hamburger" aria-label="Toggle sidebar" aria-expanded="false">
            <span></span>
            <span></span>
          </button>

          <div class="topbar__titleWrap">
            <div class="topbar__title">Dashboard</iv>
          </div>

          <div class="topbar_rightwrap">
          <button id="exportWeeklyReport">Export Weekly Report</button>
          </div>
        </header>

        <!-- Page content -->
        <main class="content">
          <!-- Big orange blocks (drop your habit widgets in these) -->
          <section class="panel">
            <h2 class="panel__heading">Panel 1</h2>
            <p class="panel__hint">Put timer / daily habits / streaks here.</p>
          </section>

          <section class="panel">
            <h2 class="panel__heading">Panel 2</h2>
            <p class="panel__hint">Put habit list / check-ins / quick actions here.</p>
          </section>

          <section class="panel">
            <h2 class="panel__heading">Panel 3</h2>
            <p class="panel__hint">Put analytics / progress charts here.</p>
          </section>
        </main>
      </div>
    </div>

    <script>
      const sidebar = document.getElementById("sidebar");
      const hamburger = document.getElementById("hamburger");

      hamburger.addEventListener("click", () => {
        const isOpen = sidebar.classList.toggle("sidebar--open");
        hamburger.setAttribute("aria-expanded", String(isOpen));
      });
    </script>

    <script>
      document.getElementById("exportWeeklyReport").addEventListener("click", () => {
  const rows = [
    ["Day", "Habits Completed", "Tasks Completed", "Focus Minutes"],
    ["Mon", 2, 1, 30],
    ["Tue", 3, 2, 45],
    ["Wed", 2, 1, 25],
    ["Thu", 1, 0, 20],
    ["Fri", 3, 3, 50],
    ["Sat", 4, 2, 45],
    ["Sun", 3, 3, 30]
  ];

  const csvContent = rows.map(row => row.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "weekly_report.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
});
    </script>
  </body>
</html>
